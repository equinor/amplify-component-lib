name: Enforce Conventional PR Title

on:
  pull_request:
    types: [ opened, edited, reopened, synchronize ]

permissions: { }

jobs:
  pr-title:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Check PR title
        uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            chore
            docs
            refactor
            test
            ci
            build
            perf
            revert
            style
          requireScope: false